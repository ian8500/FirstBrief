name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16.14-alpine
        env:
          POSTGRES_DB: firstbrief_test
          POSTGRES_USER: firstbrief
          POSTGRES_PASSWORD: firstbrief_ci
        options: >-
          --health-cmd "pg_isready -U firstbrief -d firstbrief_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
        ports:
          - 5432:5432
      redis:
        image: redis:7.4.5-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
        ports:
          - 6379:6379

    env:
      DJANGO_SETTINGS_MODULE: firstbrief.settings.test
      DJANGO_ENV: test
      DJANGO_SECRET_KEY: ci-only-not-a-production-secret
      DJANGO_ALLOWED_HOSTS: testserver,localhost
      DJANGO_SECURE_SSL_REDIRECT: "false"
      DATABASE_URL: postgresql://firstbrief:firstbrief_ci@localhost:5432/firstbrief_test
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: python -m pip install --requirement requirements/dev.txt

      - name: Formatting and lint
        run: |
          python -m ruff format --check .
          python -m ruff check .

      - name: Static typing
        run: python -m mypy firstbrief tests tools

      - name: Migration and configuration checks
        run: |
          python manage.py migrate --noinput
          python manage.py makemigrations --check --dry-run
          python manage.py check

      - name: Test
        run: python -m pytest --cov=firstbrief --cov-report=term-missing

      - name: Dependency audit
        run: python -m pip_audit --requirement requirements/base.txt

      - name: Production deployment checks
        env:
          DJANGO_SETTINGS_MODULE: firstbrief.settings.production
          DJANGO_ENV: production
          DJANGO_SECRET_KEY: "ci-check-only-4!aR8-xQ2_mZ7@vK9-pL3_tN6-sW1+cD5=eF0.gH7"
          DJANGO_ALLOWED_HOSTS: firstbrief.example.invalid
          DJANGO_SECURE_SSL_REDIRECT: "true"
        run: python manage.py check --deploy
