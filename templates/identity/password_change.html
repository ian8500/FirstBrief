{% extends "base.html" %}
{% block title %}Change password — FirstBrief{% endblock %}
{% block content %}
  <section class="panel narrow">
    <h1>Change password</h1>
    {% if request.user.must_change_password %}<p class="notice">You must change your temporary or expired password before continuing.</p>{% endif %}
    <form method="post">{% csrf_token %}{{ form.as_p }}<button type="submit">Save password</button></form>
  </section>
{% endblock %}
