{% extends "base.html" %}

{% block title %}{{ title }} — FirstBrief{% endblock %}

{% block content %}
  <section class="error-panel" aria-labelledby="error-title">
    <p class="eyebrow">Error {{ status }}</p>
    <h1 id="error-title">{{ title }}</h1>
    <p>{{ message }}</p>
    <p><strong>Reference:</strong> <code>{{ correlation_id }}</code></p>
    <p><a href="{% url 'home' %}">Return to FirstBrief</a></p>
  </section>
{% endblock %}
